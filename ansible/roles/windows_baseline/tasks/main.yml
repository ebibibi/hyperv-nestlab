---
# Common baseline for every Windows system managed by the lab.
# WinGet is normally user-registered after the first interactive logon. Fresh Server guests
# have no such logon, so bootstrap the supported stable client for all users first.

- name: "Prepare WinGet for the current remote user"
  ansible.windows.win_powershell:
    error_action: stop
    script: |
      $ErrorActionPreference = 'Stop'
      $Ansible.Changed = $false

      $machinePwsh = 'C:\Program Files\PowerShell\7\pwsh.exe'
      $userPwsh = Join-Path $env:LOCALAPPDATA 'Microsoft\WindowsApps\pwsh.exe'
      $existingPwsh = @($machinePwsh, $userPwsh) | Where-Object { Test-Path $_ } | Select-Object -First 1
      if ($existingPwsh) {
        $Ansible.Result = @{
          needs_install = $false
          version = (& $existingPwsh --version | Out-String).Trim()
        }
        return
      }

      # Microsoft documents this sequence for bootstrapping the stable WinGet client in an
      # environment without a usable registration. AllUsers avoids an interactive-logon
      # prerequisite and keeps the baseline suitable for unattended Server guests.
      $ProgressPreference = 'SilentlyContinue'
      Install-PackageProvider -Name NuGet -Force | Out-Null
      Install-Module -Name Microsoft.WinGet.Client -Force -Repository PSGallery `
        -Scope AllUsers | Out-Null
      Import-Module Microsoft.WinGet.Client -Force
      Repair-WinGetPackageManager -AllUsers

      $Ansible.Result = @{ needs_install = $true }
  register: powershell_prepare

- name: "Install the latest PowerShell with WinGet"
  when: powershell_prepare.result.needs_install | bool
  ansible.windows.win_powershell:
    error_action: stop
    script: |
      $ErrorActionPreference = 'Stop'
      $Ansible.Changed = $false
      $winget = Get-Command winget.exe -ErrorAction SilentlyContinue
      if (-not $winget) {
        $appInstaller = Get-AppxPackage Microsoft.DesktopAppInstaller
        if ($appInstaller) {
          $candidate = Join-Path $appInstaller.InstallLocation 'winget.exe'
          if (Test-Path $candidate) { $winget = Get-Item $candidate }
        }
      }
      if (-not $winget) {
        throw 'WinGet is unavailable after Repair-WinGetPackageManager.'
      }
      $machinePwsh = 'C:\Program Files\PowerShell\7\pwsh.exe'
      $userPwsh = Join-Path $env:LOCALAPPDATA 'Microsoft\WindowsApps\pwsh.exe'
      # Install the current stable release, as recommended by the PowerShell documentation.
      & $winget.Source install --id Microsoft.PowerShell --source winget `
        --installer-type wix --scope machine --silent `
        --accept-source-agreements --accept-package-agreements --disable-interactivity
      if ($LASTEXITCODE -ne 0) { throw "winget install Microsoft.PowerShell failed: $LASTEXITCODE" }

      $installedPwsh = @($machinePwsh, $userPwsh) | Where-Object { Test-Path $_ } | Select-Object -First 1
      if (-not $installedPwsh) {
        throw 'WinGet completed, but pwsh.exe was not found.'
      }
      $Ansible.Changed = $true
      $Ansible.Result = (& $installedPwsh --version | Out-String).Trim()
  register: powershell_install

- name: "PowerShell version"
  ansible.builtin.debug:
    msg: >-
      {{ powershell_install.result
         if powershell_install.result is defined
         else powershell_prepare.result.version }}
