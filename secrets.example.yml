# シークレット雛形。コピーして secrets.yml を作り、Ansible Vault で暗号化する:
#   ansible-vault encrypt secrets.yml
# L2 設定からは "{{ vault.<key> }}" で参照する。
vault:
  # ドメインの DSRM（ディレクトリ復元モード）パスワード
  dsrm_password: "ChangeMe-Str0ng!"
  # L2 VM のローカル Administrator 既定パスワード
  local_admin_password: "ChangeMe-Str0ng!"
  # ドメイン参加に使う資格情報
  domain_join_password: "ChangeMe-Str0ng!"
