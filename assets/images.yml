# イメージカタログ (ベンダリング + 版固定の台帳)。原則②の決定性の要。
# 実体の大容量ファイルは git では追跡せず、ここで「取得元・チェックサム・版」を管理する。
# bootstrap / ビルドスクリプト / ansible はこの台帳を正本として参照する。

# ---- ツール (自動取得・版固定) ----
tools:
  qemu_img:
    # qcow2 -> vhdx 変換に使用。Hyper-V 標準の Convert-VHD は qcow2 非対応のため必要。
    primary_url: "https://github.com/fdcastel/qemu-img-windows-x64/releases/latest/download/qemu-img.exe"
    fallback_url: "https://cloudbase.it/downloads/qemu-img-win-x64-2_3_0.zip"
    dest: "tools/qemu-img.exe"
  # 注: Windows golden は Packer/oscdimg を使わず DISM 標準ツールで生成する方式に変更
  #     (Build-WindowsGoldenDism.ps1)。oscdimg(ADK) 依存を排し原則① を厳守するため。
  #     Packer 版 (Build-WindowsGolden.ps1) は oscdimg がある環境向けに残置。

# ---- OS イメージ ----
images:
  # 制御ノード兼 L2 Linux の土台。軽量 cloud image を自動取得 -> VHDX 変換。
  ubuntu2404-cloudimg:
    kind: linux-cloudimg
    url: "https://cloud-images.ubuntu.com/releases/noble/release-20260518/ubuntu-24.04-server-cloudimg-amd64.img"
    sha256: "53fdde898feed8b027d94baa9cfe8229867f330a1d9c49dc7d84465ee7f229f7"
    download: "assets/ubuntu-24.04-server-cloudimg-amd64.img"
    vhdx: "assets/ubuntu2404-cloudimg.vhdx"
    generation: 2          # generic cloud image は UEFI/GPT のため Gen2
    size_note: "約599MB (qcow2)。これが Ubuntu の軽量版の実体。"

  # 制御ノードも当面は同じ Ubuntu イメージを使う (Ansible を内蔵)。
  control-node:
    kind: linux-cloudimg
    same_as: ubuntu2404-cloudimg

  # Windows L2 / L1 ホストの土台。ISO は直リンク自動 DL -> DISM で golden VHDX を生成。
  win2025-golden:
    kind: windows-golden
    iso_dir: "assets/iso"
    iso_match: "(?i)SERVER_EVAL|server.*2025|2025.*server|_SERVER_"
    # golden は言語ごとに作る: win2025-golden-<lang>.vhdx (例 win2025-golden-en-us.vhdx)。
    # ISO も言語ごと: windows-server-2025-<lang>.iso。下の windows_languages を参照。
    golden_pattern: "win2025-golden-{lang}.vhdx"
    iso_pattern: "windows-server-2025-{lang}.iso"
    generation: 2
    builder: "Build-WindowsGoldenDism.ps1 (DISM 標準ツール / oscdimg 不要)"
    # エディションは言語非依存で自動選択 (Standard + Evaluation + Desktop Experience)。

# ---- Windows 言語カタログ ----
# L2(ゲスト)の言語を YAML の `language:` で選ぶと、対応する ISO を自動 DL し
# その言語の golden を作る。L1(ホスト/1段目)は安定性のため常に en-us 固定。
# ISO はフォーム登録なしの固定 fwlink (linkid=2345828) から clcid/culture/country で取得。
# 追加したい言語は LCID(clcid) と culture/country を足すだけ。
windows_languages:
  default: en-us
  fwlink: "https://go.microsoft.com/fwlink/?linkid=2345828&clcid={clcid}&culture={culture}&country={country}"
  catalog:
    en-us: { clcid: "0x409", culture: "en-us", country: "us", label: "English (United States)" }
    ja-jp: { clcid: "0x411", culture: "ja-jp", country: "JP", label: "日本語" }
    de-de: { clcid: "0x407", culture: "de-de", country: "DE", label: "Deutsch" }
    fr-fr: { clcid: "0x40c", culture: "fr-fr", country: "FR", label: "Français" }
    es-es: { clcid: "0x40a", culture: "es-es", country: "ES", label: "Español" }
    it-it: { clcid: "0x410", culture: "it-it", country: "IT", label: "Italiano" }
    ko-kr: { clcid: "0x412", culture: "ko-kr", country: "KR", label: "한국어" }
    zh-cn: { clcid: "0x804", culture: "zh-cn", country: "CN", label: "中文(简体)" }
    pt-br: { clcid: "0x416", culture: "pt-br", country: "BR", label: "Português (Brasil)" }
    ru-ru: { clcid: "0x419", culture: "ru-ru", country: "RU", label: "Русский" }

# ---- Linux ロケール対応 (cloud-init) ----
# L2 Linux は単一 cloud image を使い、`language:` をロケールへ写像して cloud-init で設定する。
linux_locales:
  en-us: "en_US.UTF-8"
  ja-jp: "ja_JP.UTF-8"
  de-de: "de_DE.UTF-8"
  fr-fr: "fr_FR.UTF-8"
  es-es: "es_ES.UTF-8"
  it-it: "it_IT.UTF-8"
  ko-kr: "ko_KR.UTF-8"
  zh-cn: "zh_CN.UTF-8"
  pt-br: "pt_BR.UTF-8"
  ru-ru: "ru_RU.UTF-8"
