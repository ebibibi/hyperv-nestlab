---
# 制御 VM の Ansible から L1 (Nested ホスト) を WinRM で構成する本線の L1 版。
# 1. 疎通確認 (win_ping)
# 2. L1 内に Hyper-V 役割を冪等にインストール
# 3. L1 内に NAT 仮想スイッチ (LabNAT) を冪等に作成
- name: "L1 Nested ホストの構成 (制御 VM -> WinRM -> L1)"
  hosts: l1
  gather_facts: false
  tasks:
    - name: win_ping
      ansible.windows.win_ping:

    - name: Hyper-V 役割の状態を取得
      ansible.windows.win_powershell:
        script: |
          $f = Get-WindowsFeature -Name Hyper-V
          $Ansible.Result = @{ installed = $f.Installed; state = $f.InstallState.ToString() }
      register: hvfeat

    - name: Hyper-V 役割をインストール (未導入なら / 再起動が必要な場合あり)
      when: not (hvfeat.result.installed | bool)
      ansible.windows.win_powershell:
        script: |
          $r = Install-WindowsFeature -Name Hyper-V -IncludeManagementTools
          $Ansible.Changed = $true
          $Ansible.Result = @{ success = $r.Success; restartNeeded = $r.RestartNeeded.ToString() }
      register: hvinstall

    - name: 再起動が必要なら再起動して待機
      when: hvinstall is changed and (hvinstall.result.restartNeeded | default('No')) != 'No'
      ansible.windows.win_reboot:
        reboot_timeout: 600

    - name: L1 内に仮想スイッチと第1段NATを冪等作成
      # L2 internet path: 10.10/24 --(this NetNat)--> 10.20/24 --(L0 NetNat)--> internet.
      vars:
        sw: "{{ l1.nat.switch }}"
        subnet: "{{ l1.nat.subnet }}"
        host_ip: "{{ l1.nat.host_ip }}"
      ansible.windows.win_powershell:
        script: |
          param($Sw,$HostIp,$Subnet)
          $Ansible.Changed = $false
          if (-not (Get-VMSwitch -Name $Sw -ErrorAction SilentlyContinue)) {
            New-VMSwitch -Name $Sw -SwitchType Internal | Out-Null; $Ansible.Changed = $true
          }
          $alias = "vEthernet ($Sw)"
          $prefix = [int]($Subnet.Split('/')[1])
          if (-not (Get-NetIPAddress -InterfaceAlias $alias -AddressFamily IPv4 -ErrorAction SilentlyContinue | Where-Object IPAddress -eq $HostIp)) {
            New-NetIPAddress -InterfaceAlias $alias -IPAddress $HostIp -PrefixLength $prefix | Out-Null; $Ansible.Changed = $true
          }
          $natName = "$Sw-NAT"
          $nat = Get-NetNat -Name $natName -ErrorAction SilentlyContinue
          if ($nat -and $nat.InternalIPInterfaceAddressPrefix -ne $Subnet) {
            Remove-NetNat -Name $natName -Confirm:$false
            $nat = $null
            $Ansible.Changed = $true
          }
          if (-not $nat) {
            New-NetNat -Name $natName -InternalIPInterfaceAddressPrefix $Subnet | Out-Null
            $Ansible.Changed = $true
          }
        parameters:
          Sw: "{{ sw }}"
          HostIp: "{{ host_ip }}"
          Subnet: "{{ subnet }}"
      register: l1net

    - name: L2 管理ポートをL1 NAT外側へ冪等公開
      vars:
        vm: "{{ hostvars[item] }}"
      ansible.windows.win_powershell:
        script: |
          param($NatName,$ExternalPort,$InternalIp,$InternalPort)
          $Ansible.Changed = $false
          $existing = Get-NetNatStaticMapping -NatName $NatName -ErrorAction SilentlyContinue |
            Where-Object { $_.Protocol -eq 6 -and $_.ExternalPort -eq $ExternalPort }
          $correct = $existing | Where-Object {
            $_.InternalIPAddress -eq $InternalIp -and $_.InternalPort -eq $InternalPort
          }
          if (-not $correct) {
            $existing | Remove-NetNatStaticMapping -Confirm:$false
            Add-NetNatStaticMapping -NatName $NatName -Protocol TCP -ExternalIPAddress '0.0.0.0' `
              -ExternalPort $ExternalPort -InternalIPAddress $InternalIp -InternalPort $InternalPort | Out-Null
            $Ansible.Changed = $true
          }
        parameters:
          NatName: "{{ l1.nat.switch }}-NAT"
          ExternalPort: "{{ vm.management.external_port }}"
          InternalIp: "{{ vm.nics[0].ip }}"
          InternalPort: "{{ vm.management.internal_port }}"
      loop: "{{ groups['l2_windows'] + groups['l2_linux'] }}"
      loop_control:
        label: "{{ item }}:{{ hostvars[item].management.external_port }}"

    - name: Kerberos KDCをL1 NAT外側へ冪等公開
      when: groups['domain_controllers'] | length > 0
      ansible.windows.win_powershell:
        script: |
          param($NatName,$Protocol,$InternalIp)
          $Ansible.Changed = $false
          $protocolNumber = if ($Protocol -eq 'TCP') { 6 } else { 17 }
          $existing = Get-NetNatStaticMapping -NatName $NatName -ErrorAction SilentlyContinue |
            Where-Object { $_.Protocol -eq $protocolNumber -and $_.ExternalPort -eq 88 }
          $correct = $existing | Where-Object { $_.InternalIPAddress -eq $InternalIp -and $_.InternalPort -eq 88 }
          if (-not $correct) {
            $existing | Remove-NetNatStaticMapping -Confirm:$false
            Add-NetNatStaticMapping -NatName $NatName -Protocol $Protocol -ExternalIPAddress '0.0.0.0' `
              -ExternalPort 88 -InternalIPAddress $InternalIp -InternalPort 88 | Out-Null
            $Ansible.Changed = $true
          }
        parameters:
          NatName: "{{ l1.nat.switch }}-NAT"
          Protocol: "{{ item }}"
          InternalIp: "{{ hostvars[groups['domain_controllers'][0]].nics[0].ip }}"
      loop: [TCP, UDP]

    - name: L1 をルータ化 (CtrlNAT <-> LabNAT の IP 転送を有効化)
      # 制御 VM (CtrlNAT) から L2 (LabNAT) へ到達できるよう L1 をルータにする。
      # CtrlNAT は L1 の直結サブネットなので NetNat は素通し、L2 の internet 用 NAT と共存する。
      vars:
        ctrl_ip: "{{ hostvars[inventory_hostname]['ansible_host'] | default('10.20.0.20') }}"
        lab_gw: "{{ l1.nat.host_ip }}"
      ansible.windows.win_powershell:
        error_action: stop
        script: |
          param($CtrlIp,$LabGw)
          $ErrorActionPreference = 'Stop'
          $Ansible.Changed = $false
          foreach ($ip in @($CtrlIp,$LabGw)) {
            $a = Get-NetIPAddress -IPAddress $ip -AddressFamily IPv4 -ErrorAction SilentlyContinue
            if ($a) {
              $ni = Get-NetIPInterface -InterfaceIndex $a.InterfaceIndex -AddressFamily IPv4
              if ($ni.Forwarding -ne 'Enabled') {
                Set-NetIPInterface -InterfaceIndex $a.InterfaceIndex -AddressFamily IPv4 -Forwarding Enabled
                $Ansible.Changed = $true
              }
            }
          }
        parameters:
          CtrlIp: "{{ ctrl_ip }}"
          LabGw: "{{ lab_gw }}"
      register: l1fwd

    - name: 結果サマリ
      ansible.builtin.debug:
        msg: "Hyper-V={{ hvfeat.result.state }} -> install_changed={{ hvinstall is changed }}, LabNAT_changed={{ l1net.changed }}, forwarding_changed={{ l1fwd.changed }}"
