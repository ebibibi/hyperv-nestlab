# Active Directory フォレスト + メンバサーバ 1 台の例。
# dc01 を新規フォレストに昇格し、mem01 をドメイン参加させる。
# 既存 golden をそのまま使う (追加イメージ不要)。
#
# 注: dsrm_password は本来 vault 管理だが、自己完結ラボのデモのため具体値を置く。
#     本番では "{{ vault.dsrm_password }}" を使い、シークレットは vault で暗号化すること。
defaults:
  cpu: 2
  memory_gb: 8          # Server 2025(Desktop Experience)のDC/メンバは4GBだと窮屈なので8GBを既定に
  os: windows_server_2025
  domain_join: corp.contoso.local

domain:
  fqdn: corp.contoso.local
  netbios: CORP
  dsrm_password: "P@ssw0rd-DSRM-Lab!"
  controllers:
    - { name: dc01, ip: 10.10.0.10 }

groups:
  - name: members
    name_prefix: mem
    count: 1
    ip_from: 10.10.0.21
