[defaults]
inventory = inventory/resolved_inventory.py
roles_path = roles
host_key_checking = False
retry_files_enabled = False
# collections は制御 VM の既定 (~/.ansible/collections) を使う。
# requirements.yml で ansible.windows / community.windows 等を導入済み。
interpreter_python = auto_silent

[inventory]
enable_plugins = script

[ssh_connection]
pipelining = True
